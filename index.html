<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio Website</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CG96DECEJY"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-CG96DECEJY');
    </script>
</head>
<body>
    <h1>Welcome to My Portfolio!</h1>
    <p>This is my personal website built for the GA4 project.</p>

    <!-- KPI 1: Download Resume Button -->
    <button onclick="trackDownloadCV()">Download My Resume</button>

    <!-- KPI 2: Contact Me Link -->
    <a href="mailto:your-email@example.com" onclick="trackContactRequest()">Contact Me</a>

    <script>
        // Track Resume Download (KPI: Conversion Rate)
        function trackDownloadCV() {
            gtag('event', 'download_cv', {
                'event_category': 'KPI_Tracking',
                'event_label': 'Resume_Download_Click',
                'engagement_type': 'Conversion'
            });
        }

        // Track Contact Request (KPI: Lead Generation)
        function trackContactRequest() {
            gtag('event', 'contact_request', {
                'event_category': 'KPI_Tracking',
                'event_label': 'Contact_Link_Click',
                'engagement_type': 'Lead_Generation'
            });
        }

        // Track Page Stay Duration (KPI: Avg. Session Duration)
        let startTime = new Date().getTime();
        window.addEventListener('beforeunload', function() {
            let endTime = new Date().getTime();
            let duration = Math.round((endTime - startTime) / 1000);
            gtag('event', 'page_leave', {
                'event_category': 'User_Behavior',
                'event_label': 'Session_Duration',
                'value': duration
            });
        });
    </script>
</body>
</html>
